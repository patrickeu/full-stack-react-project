version: '3.9'
services:
  blog-database:
    image: mongo
    ports:
      - '27017:27017'
  blog-backend:
    build: backend/
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      - PORT=3001
      #- DATABASE_URL=mongodb://host.docker.internal:27017/blog
      - DATABASE_URL=mongodb+srv://fixprosg_db_user:Yu20120909@cluster0.k94ruuw.mongodb.net/?appName=Cluster0
    ports:
      - '3001:3001'
    depends_on:
      - blog-database
  blog-frontend:
    build:
      context: .
      args:
        VITE_BACKEND_URL: http://localhost:3001/api/v1
    ports:
      - '3000:80'
    depends_on:
      - blog-backend
